<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Review Link Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Google Review Link Generator</h1>
      <p>Find your Google Place ID and get a direct link customers can click to leave a review.</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label for="business-name">Business Name <span class="required">*</span></label>
        <input
          type="text"
          id="business-name"
          placeholder="e.g. Crawlspace Solutions LLC"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="location">City &amp; State <span class="optional">(recommended)</span></label>
        <input
          type="text"
          id="location"
          placeholder="e.g. Nashville, TN"
          autocomplete="off"
        />
      </div>

      <button id="search-btn" onclick="searchBusiness()">Find My Place ID</button>
    </div>

    <div id="results-area"></div>
  </div>

  <script>
    // ─── Maps JS API setup ────────────────────────────────────────────────────
    window.mapsReady = false;
    function onMapsLoad() { window.mapsReady = true; }

    function waitForMaps(timeout = 6000) {
      if (window.mapsReady) return Promise.resolve(true);
      return new Promise((resolve) => {
        const start = Date.now();
        const check = setInterval(() => {
          if (window.mapsReady) { clearInterval(check); resolve(true); }
          if (Date.now() - start > timeout) { clearInterval(check); resolve(false); }
        }, 100);
      });
    }

    // ─── Main search flow ─────────────────────────────────────────────────────
    async function searchBusiness() {
      const name = document.getElementById('business-name').value.trim();
      const location = document.getElementById('location').value.trim();

      if (!name) {
        showError('Please enter your business name.');
        return;
      }

      setLoading(true);
      clearResults();

      const queries = buildQueryFallbacks(name, location);

      // Step 1: REST Places API (server-side, key hidden)
      for (const query of queries) {
        const results = await callRestAPI(query);
        if (results === null) { setLoading(false); showError('Something went wrong. Please try again.'); return; }
        if (results.length > 0) { setLoading(false); displayResults(results, name); return; }
      }

      // Step 2: Maps JavaScript API (broader index, finds SABs)
      const mapsLoaded = await waitForMaps();
      if (mapsLoaded) {
        for (const query of queries) {
          const results = await callMapsJsAPI(query);
          if (results.length > 0) { setLoading(false); displayResults(results, name); return; }
        }
      }

      // Step 3: Manual entry fallback
      setLoading(false);
      showManualEntry(name);
    }

    // ─── Query builder ────────────────────────────────────────────────────────
    function buildQueryFallbacks(name, location) {
      const queries = [];
      const cleanName = name.replace(/\b(LLC|Inc|Co|Corp|Ltd|DBA)\b\.?/gi, '').trim();

      if (location) {
        queries.push(`${name} ${location}`);
        if (cleanName !== name) queries.push(`${cleanName} ${location}`);
        if (location.includes(',')) {
          const state = location.split(',')[1].trim();
          queries.push(`${name} ${state}`);
        }
      }

      queries.push(name);
      if (cleanName !== name) queries.push(cleanName);

      return [...new Set(queries)];
    }

    // ─── Step 1: REST API ─────────────────────────────────────────────────────
    async function callRestAPI(query) {
      try {
        const response = await fetch(`/search?query=${encodeURIComponent(query)}`);
        if (!response.ok) return null;
        const data = await response.json();
        if (data.status === 'OK') return data.results;
        if (data.status === 'ZERO_RESULTS') return [];
        return null;
      } catch {
        return null;
      }
    }

    // ─── Step 2: Maps JS API ──────────────────────────────────────────────────
    function callMapsJsAPI(query) {
      return new Promise((resolve) => {
        try {
          const div = document.createElement('div');
          const service = new google.maps.places.PlacesService(div);
          service.textSearch({ query }, (results, status) => {
            if (status === google.maps.places.PlacesServiceStatus.OK && results) {
              resolve(results.map(r => ({
                place_id: r.place_id,
                name: r.name,
                formatted_address: r.formatted_address || ''
              })));
            } else {
              resolve([]);
            }
          });
        } catch {
          resolve([]);
        }
      });
    }

    // ─── Display results ──────────────────────────────────────────────────────
    function displayResults(results, originalName) {
      const area = document.getElementById('results-area');
      if (results.length === 1) {
        area.innerHTML = buildSingleResult(results[0]);
      } else {
        area.innerHTML = buildMultipleResults(results.slice(0, 5));
      }
    }

    function buildSingleResult(place) {
      const reviewLink = `https://search.google.com/local/writereview?placeid=${place.place_id}`;
      const addressLine = place.formatted_address
        ? `<p class="address">${escapeHtml(place.formatted_address)}</p>` : '';
      return `
        <div class="card result-card">
          <div class="result-found"><span class="check">&#10003;</span> Business found</div>
          <h2 class="place-name">${escapeHtml(place.name)}</h2>
          ${addressLine}
          <div class="info-block">
            <label>Place ID</label>
            <div class="copy-row">
              <code id="place-id-value">${place.place_id}</code>
              <button class="copy-btn" onclick="copyText('place-id-value', this)">Copy</button>
            </div>
          </div>
          <div class="info-block">
            <label>Review Link</label>
            <div class="copy-row">
              <code id="review-link-value">${reviewLink}</code>
              <button class="copy-btn" onclick="copyText('review-link-value', this)">Copy</button>
            </div>
          </div>
          <a class="open-link-btn" href="${reviewLink}" target="_blank" rel="noopener">
            Open Review Link &rarr;
          </a>
        </div>`;
    }

    function buildMultipleResults(results) {
      const cards = results.map(place => {
        const addressLine = place.formatted_address
          ? `<p class="address">${escapeHtml(place.formatted_address)}</p>` : '';
        return `
          <div class="multi-result">
            <div class="multi-result-info">
              <strong>${escapeHtml(place.name)}</strong>
              ${addressLine}
            </div>
            <button class="select-btn" onclick="selectPlace('${place.place_id}', \`${escapeHtml(place.name)}\`, \`${escapeHtml(place.formatted_address || '')}\`)">
              This is mine
            </button>
          </div>`;
      }).join('');
      return `
        <div class="card result-card">
          <p class="multi-header">We found a few matches. Which one is your business?</p>
          <div class="multi-list">${cards}</div>
          <button class="cant-find-btn" onclick="showManualEntry('')">I don&rsquo;t see my business</button>
        </div>`;
    }

    function selectPlace(placeId, name, address) {
      const reviewLink = `https://search.google.com/local/writereview?placeid=${placeId}`;
      const addressLine = address ? `<p class="address">${escapeHtml(address)}</p>` : '';
      document.getElementById('results-area').innerHTML = `
        <div class="card result-card">
          <div class="result-found"><span class="check">&#10003;</span> Business selected</div>
          <h2 class="place-name">${escapeHtml(name)}</h2>
          ${addressLine}
          <div class="info-block">
            <label>Place ID</label>
            <div class="copy-row">
              <code id="place-id-value">${placeId}</code>
              <button class="copy-btn" onclick="copyText('place-id-value', this)">Copy</button>
            </div>
          </div>
          <div class="info-block">
            <label>Review Link</label>
            <div class="copy-row">
              <code id="review-link-value">${reviewLink}</code>
              <button class="copy-btn" onclick="copyText('review-link-value', this)">Copy</button>
            </div>
          </div>
          <a class="open-link-btn" href="${reviewLink}" target="_blank" rel="noopener">
            Open Review Link &rarr;
          </a>
        </div>`;
    }

    // ─── Step 3: Manual entry ─────────────────────────────────────────────────
    function showManualEntry(name) {
      const intro = name
        ? `<p class="no-results-title">We couldn&rsquo;t find &ldquo;${escapeHtml(name)}&rdquo; automatically.</p>
           <p class="no-results-sub">Find your Place ID using the steps below, then paste it here to generate your link.</p>`
        : `<p class="no-results-title">Enter your Place ID manually</p>
           <p class="no-results-sub">Follow the steps below to find it, then paste it here.</p>`;
      document.getElementById('results-area').innerHTML = `
        <div class="card result-card">
          ${intro}
          <ol class="manual-steps">
            <li>Go to <a href="https://www.google.com/maps" target="_blank" rel="noopener">Google Maps</a> and search your exact business name</li>
            <li>Click your business listing in the results</li>
            <li>Look at the URL in your browser &mdash; find the part that starts with <code>1s</code> followed by <code>ChIJ...</code></li>
            <li>Copy everything from <code>ChIJ</code> up to the next <code>!</code> or end of that segment</li>
          </ol>
          <div class="manual-entry">
            <div class="form-group">
              <label for="manual-place-id">Paste your Place ID here</label>
              <input type="text" id="manual-place-id" placeholder="ChIJ..." autocomplete="off" />
            </div>
            <button id="manual-btn" onclick="generateFromManualId()">Generate Review Link</button>
          </div>
        </div>`;

      document.getElementById('manual-place-id').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') generateFromManualId();
      });
    }

    function generateFromManualId() {
      const placeId = document.getElementById('manual-place-id').value.trim();
      if (!placeId) {
        document.getElementById('manual-place-id').style.borderColor = '#ef4444';
        return;
      }
      const reviewLink = `https://search.google.com/local/writereview?placeid=${placeId}`;
      document.getElementById('results-area').innerHTML = `
        <div class="card result-card">
          <div class="result-found"><span class="check">&#10003;</span> Review link ready</div>
          <div class="info-block" style="margin-top: 16px;">
            <label>Place ID</label>
            <div class="copy-row">
              <code id="place-id-value">${escapeHtml(placeId)}</code>
              <button class="copy-btn" onclick="copyText('place-id-value', this)">Copy</button>
            </div>
          </div>
          <div class="info-block">
            <label>Review Link</label>
            <div class="copy-row">
              <code id="review-link-value">${reviewLink}</code>
              <button class="copy-btn" onclick="copyText('review-link-value', this)">Copy</button>
            </div>
          </div>
          <a class="open-link-btn" href="${reviewLink}" target="_blank" rel="noopener">
            Open Review Link &rarr;
          </a>
        </div>`;
    }

    // ─── Utilities ────────────────────────────────────────────────────────────
    function copyText(elementId, btn) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function showError(message) {
      document.getElementById('results-area').innerHTML =
        `<div class="message error">${message}</div>`;
    }

    function setLoading(on) {
      const btn = document.getElementById('search-btn');
      btn.disabled = on;
      btn.textContent = on ? 'Searching...' : 'Find My Place ID';
    }

    function clearResults() {
      document.getElementById('results-area').innerHTML = '';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.activeElement.id !== 'manual-place-id') {
        searchBusiness();
      }
    });
  </script>

  <!-- Maps JS API: replace AIzaSyB5Ro3-5Z6lz8Q8QhmkV4xETYpyDMjiqJc with your domain-restricted key -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB5Ro3-5Z6lz8Q8QhmkV4xETYpyDMjiqJc&libraries=places&callback=onMapsLoad" async defer></script>

</body>
</html>
